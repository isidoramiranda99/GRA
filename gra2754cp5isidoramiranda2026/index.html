<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>HTML5-Drop Project | Isidora Miranda,2026</title>
<script>
function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
  ev.preventDefault();
  var data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}
</script>
<style type="text/css">
body {
	margin: 0;
	background-color: #FFD6F7;
}
wrapper  {
	margin: auto;
	width: 1920px;
	display: block;
}
wrapper div {
	width: 900px;
	border: thin solid black;
	height: 600px;
	margin-top: 25px;
	margin-right: 25px;
	margin-left: 25px;
	margin-bottom: 25px;
	display: inline-block;
	vertical-align: top;
}
div img {
	width: 100%;
	height: auto;
}
</style>
</head>

<body>
<wrapper>
  <div id="drop1" ondrop="drop(event)" ondragover="allowDrop(event)"><img src="usahana.png" alt="" width="88" height="31" id="drag1" draggable="true" ondragstart="drag(event)"></div>
  <div id="drop2" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
  <div id="drop3" ondrop="drop(event)" ondragover="allowDrop(event)"><img src="usahana2.png" alt="" width="88" height="31" id="drag2" draggable="true" ondragstart="drag(event)"></div>
  <div id="drop4" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
</wrapper>
</body>
</html>
